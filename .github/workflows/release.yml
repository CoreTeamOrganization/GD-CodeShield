name: Release

# Creates a GitHub Release whenever a version tag is pushed.
# Tag format: v<version> (e.g. v1.3.1) — matches the headings in CHANGELOG.md.
#
#   git tag v1.3.1
#   git push origin v1.3.1
#
# The release notes are taken from the matching "## [<version>]" section of
# CHANGELOG.md. If no matching section is found, notes are auto-generated from
# the commits/PRs since the previous tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for gh release create

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so --generate-notes can diff against the previous tag

      - name: Build release notes from CHANGELOG
        id: notes
        run: |
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"          # strip leading "v" → 1.3.1
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Extract the section between "## [<version>]" and the next "## [" heading.
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { capture=1; next }
            capture && /^## \[/        { exit }
            capture                    { print }
          ' CHANGELOG.md > release_notes.md

          if grep -q '[^[:space:]]' release_notes.md; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            echo "Found CHANGELOG section for $VERSION:"
            cat release_notes.md
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
            echo "No CHANGELOG section for $VERSION — will auto-generate notes."
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.notes.outputs.has_notes }}" = "true" ]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "GD CodeShield ${{ steps.notes.outputs.version }}" \
              --notes-file release_notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "GD CodeShield ${{ steps.notes.outputs.version }}" \
              --generate-notes
          fi
